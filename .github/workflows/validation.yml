name: Validation

on:
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    name: Lint, Test & Build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        id: lint
        run: npm run lint
        continue-on-error: true

      - name: Unit Tests
        id: test
        run: npm test
        continue-on-error: true

      - name: Build (Vite)
        id: build
        run: npm run build
        continue-on-error: true

      - name: Build Models
        id: build-models
        run: npm run build:models
        continue-on-error: true

      - name: Comment PR result
        uses: actions/github-script@v7
        if: always()
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const steps = {
              lint: '${{ steps.lint.outcome }}',
              test: '${{ steps.test.outcome }}',
              build: '${{ steps.build.outcome }}',
              'build-models': '${{ steps.build-models.outcome }}',
            };

            const icon = (outcome) => outcome === 'success' ? '✅' : outcome === 'failure' ? '❌' : '⏭️';
            const allPassed = Object.values(steps).every(o => o === 'success');

            const rows = Object.entries(steps)
              .map(([name, outcome]) => `| ${icon(outcome)} | \`${name}\` | ${outcome} |`)
              .join('\n');

            const body = [
              `## ${allPassed ? '✅ All checks passed' : '❌ Some checks failed'}`,
              '',
              '| Status | Step | Result |',
              '|--------|------|--------|',
              rows,
              '',
              `> Triggered by commit \`${{ github.sha }}\``,
            ].join('\n');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
