version: 1
indices:
  query-index:
    include:
      - /plans/**
      - /blog/**
    exclude:
      - /tools/**
      - /drafts/**
    properties:
      title:
        select: head > title
      description:
        select: head > meta[name="description"]
        value: attribute(el, "content")
      image:
        select: head > meta[property="og:image"]
        value: attribute(el, "content")
      date:
        select: head > meta[name="date"]
        value: attribute(el, "content")
        type: date
