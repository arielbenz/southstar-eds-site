<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="Description" content="SouthStar Sidekick Library" />
    <meta name="robots" content="noindex" />
    <base href="/" />
    <title>SouthStar - Sidekick Library</title>
    <style>
      /* ---- Brand CSS variables for the library tables ---- */
      :root {
        --sk-color-primary: #e87722;
        --sk-color-primary-dark: #c45e00;
        --sk-color-secondary: #003087;
        --sk-color-secondary-light: #e8eef8;
        --sk-color-surface: #f5f5f5;
        --sk-color-border: #e0e0e0;
        --sk-color-text: #1a1a1a;
        --sk-font: 'Source Sans Pro', system-ui, sans-serif;

        /* Sidekick Library table header colors (official variable names per docs) */
        --sk-block-table-background-color: #003087;
        --sk-block-table-foreground-color: #ffffff;

        --sk-section-metadata-table-background-color: #e87722;
        --sk-section-metadata-table-foreground-color: #ffffff;

        --sk-metadata-table-background-color: #1a1a1a;
        --sk-metadata-table-foreground-color: #ffffff;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        font-family: var(--sk-font);
        background-color: var(--sk-color-surface);
      }

      sidekick-library {
        display: block;
        height: 100%;
      }

      /* Hide the AEM sidekick if it loads inside the library page */
      helix-sidekick {
        display: none;
      }
    </style>
  </head>
  <body>
    <script
      type="module"
      src="https://www.aem.live/tools/sidekick/library/index.js"
    ></script>
    <script>
      const library = document.createElement('sidekick-library');
      library.config = {
        base: '/tools/sidekick/library.json',
        plugins: {
          blocks: {
            // Responsive preview viewports matching common device breakpoints
            viewPorts: [
              { width: '480px', label: 'Mobile', icon: 'device-phone' },
              { width: '768px', label: 'Tablet', icon: 'device-tablet' },
              {
                width: '100%',
                label: 'Desktop',
                icon: 'device-desktop',
                default: true,
              },
            ],
          },
        },
      };
      document.body.prepend(library);

      // Workaround for a bug in the sidekick-library blocks plugin:
      // its PreviewBlock listener reads e.details.path but CustomEvent uses .detail
      Object.defineProperty(CustomEvent.prototype, 'details', {
        get() {
          return this.detail;
        },
        configurable: true,
      });

      // Deduplicate rapid window.open calls: index.js dispatches PreviewBlock
      // (blocks.js opens it) then ALSO calls window.open — causing two tabs.
      // Suppress any open to the same URL within 100 ms.
      const _origOpen = window.open.bind(window);
      let _lastPreview = null;
      window.open = (url, target, features) => {
        if (url && url === _lastPreview) return null;
        _lastPreview = url;
        setTimeout(() => {
          _lastPreview = null;
        }, 100);
        return _origOpen(url, target, features);
      };
    </script>
  </body>
</html>
